<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body style="margin:0;padding:0;background:#faf8f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#faf8f5;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:520px;background:#fffefb;border-radius:16px;border:1px solid #e7e5e4;box-shadow:0 8px 32px rgba(28,25,23,0.06);">
          <tr>
            <td style="padding:32px 32px 8px 32px;">
              <div style="font-size:22px;font-weight:800;letter-spacing:-0.04em;color:#1c1917;">Kazaro</div>
              <p style="margin:20px 0 0;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#0f766e;">Convite</p>
              <h1 style="margin:8px 0 0;font-size:24px;font-weight:700;letter-spacing:-0.03em;color:#1c1917;line-height:1.2;">Você foi convidado</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 28px 32px;color:#44403c;font-size:15px;line-height:1.65;">
              <p style="margin:0;">Foi criado um convite para você entrar no Kazaro em <strong style="color:#1c1917;">{{ .SiteURL }}</strong>.</p>
              <p style="margin:16px 0 0;">Aceite abaixo para definir sua senha e ativar o acesso.</p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:28px 0 0;">
                <tr>
                  <td style="border-radius:999px;background:#0f766e;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" rel="noopener" style="display:inline-block;padding:15px 32px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:999px;">Aceitar convite</a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:12px;word-break:break-all;color:#57534e;line-height:1.45;">{{ .ConfirmationURL }}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #f3eee8;">
              <p style="margin:0;font-size:12px;color:#a8a29e;line-height:1.5;">Kazaro · serviços e agendamentos</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
